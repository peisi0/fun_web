<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式霓虹温度计</title>
    <style>
        :root {
            --bg-color: #0f1015;
            --tube-width: 80px;
            --tube-height: 400px;
            --liquid-hue: 200; /* 初始蓝色 */
            --liquid-height: 20%;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        /* 温度计和刻度的包装器 */
        .thermometer-wrapper {
            position: relative;
            width: 280px;
            height: var(--tube-height);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 温度计外壳 (玻璃管) */
        .thermometer {
            width: var(--tube-width);
            height: var(--tube-height);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 
                0 0 20px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 10;
            isolation: isolate;
        }

        /* 刻度线容器 */
        .scale {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: var(--tube-height);
            pointer-events: none;
            z-index: 5;
        }

        .tick {
            position: absolute;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            transform: translateZ(0);
        }
        .tick.left { 
            left: 50px;
            width: 15px;
        }
        .tick.right { 
            right: 50px;
            width: 15px;
        }
        .tick.major.left { 
            width: 25px;
        }
        .tick.major.right {
            width: 25px;
        }
        .tick.major { 
            background: rgba(255, 255, 255, 0.6);
        }
        .tick-label {
            position: absolute;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            transform: translateY(-50%);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            min-width: 30px;
            text-align: center;
        }
        .tick-label.left { 
            left: 10px;
            text-align: right;
        }
        .tick-label.right { 
            right: 10px;
            text-align: left;
        }

        /* 液体部分 */
        .liquid {
            position: absolute;
            bottom: 4px;
            left: 4px;
            right: 4px;
            height: var(--liquid-height);
            background: linear-gradient(to top, 
                hsl(var(--liquid-hue), 100%, 40%), 
                hsl(var(--liquid-hue), 100%, 60%)
            );
            border-radius: 0 0 40px 40px;
            border-radius: 
                calc(var(--tube-width)/2) calc(var(--tube-width)/2) 
                40px 40px;
            
            transition: none;
            box-shadow: 
                0 0 30px hsl(var(--liquid-hue), 100%, 50%),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            
            filter: drop-shadow(0 0 15px hsl(var(--liquid-hue), 100%, 50%));
            overflow: hidden;
            will-change: height;
        }

        /* 液体顶部的亮面 (Meniscus) */
        .liquid::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 10px;
            right: 10px;
            height: 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            border-radius: 50%;
            opacity: 0.6;
        }

        /* 气泡动画特效 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: -10px;
            animation: rise 2s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-300px) scale(1.2); opacity: 0; }
        }

        /* 数字显示 */
        .readout {
            font-size: 4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px hsl(var(--liquid-hue), 100%, 50%);
            margin-top: 20px;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        .unit {
            font-size: 1.5rem;
            vertical-align: super;
            opacity: 0.7;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }
        .unit:hover {
            opacity: 1;
        }
        .unit.inactive {
            opacity: 0.3;
            font-size: 1.2rem;
        }

        /* 交互区域 */
        .interaction-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: ns-resize;
            z-index: 100;
        }

        /* 背景氛围灯 */
        .ambient-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, hsl(var(--liquid-hue), 100%, 20%) 0%, transparent 70%);
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
            transition: background 0.2s;
        }

    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <div class="thermometer-wrapper">
            <div class="scale" id="scale-container">
                <div style="position: absolute; top: -30px; left: 50px; font-weight: bold;" id="scale-label-left">°C</div>
                <div style="position: absolute; top: -30px; right: 50px; font-weight: bold;" id="scale-label-right">°F</div>
            </div>
            
            <div class="thermometer">
                <div class="liquid" id="liquid"></div>
                <div class="interaction-area" id="interaction-area"></div>
            </div>
        </div>

        <div class="readout">
            <span id="temp-val">32</span>
            <span class="unit" id="unit-fahrenheit" onclick="switchUnit('F')">°F</span>
            <span class="unit inactive" id="unit-celsius" onclick="switchUnit('C')">°C</span>
        </div>
    </div>

    <script>
        const liquid = document.getElementById('liquid');
        const tempValDisplay = document.getElementById('temp-val');
        const root = document.documentElement;
        const scaleContainer = document.getElementById('scale-container');
        const interactionArea = document.getElementById('interaction-area');
        const thermometer = document.querySelector('.thermometer');
        const unitF = document.getElementById('unit-fahrenheit');
        const unitC = document.getElementById('unit-celsius');

        const minTempC = -30;
        const maxTempC = 50;
        
        let currentTempC = 0;
        let isDragging = false;
        let startY = 0;
        let startTemp = 0;
        let displayUnit = 'F';

        // 生成刻度线 (JS 生成比 HTML 手写更整洁)
        function generateScale() {
            const steps = 8;
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i <= steps; i++) {
                const pct = (i / steps) * 100;
                const topPos = 100 - pct;
                
                const valC = minTempC + (i / steps) * (maxTempC - minTempC);
                const valF = (valC * 9/5) + 32;

                const tickL = document.createElement('div');
                tickL.className = 'tick left major';
                tickL.style.top = `${topPos.toFixed(2)}%`;
                fragment.appendChild(tickL);

                const labelL = document.createElement('div');
                labelL.className = 'tick-label left';
                labelL.style.top = `${topPos.toFixed(2)}%`;
                labelL.textContent = Math.round(valC);
                fragment.appendChild(labelL);

                const tickR = document.createElement('div');
                tickR.className = 'tick right major';
                tickR.style.top = `${topPos.toFixed(2)}%`;
                fragment.appendChild(tickR);

                const labelR = document.createElement('div');
                labelR.className = 'tick-label right';
                labelR.style.top = `${topPos.toFixed(2)}%`;
                labelR.textContent = Math.round(valF);
                fragment.appendChild(labelR);

                if (i < steps) {
                    for(let j=1; j<5; j++) {
                        const subPct = pct + (j/5) * (100/steps);
                        const subTop = 100 - subPct;
                        
                        const subTickL = document.createElement('div');
                        subTickL.className = 'tick left';
                        subTickL.style.top = `${subTop.toFixed(2)}%`;
                        fragment.appendChild(subTickL);

                        const subTickR = document.createElement('div');
                        subTickR.className = 'tick right';
                        subTickR.style.top = `${subTop.toFixed(2)}%`;
                        fragment.appendChild(subTickR);
                    }
                }
            }
            
            scaleContainer.appendChild(fragment);
        }

        // 气泡生成系统
        function createBubbles() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            // 随机大小和位置
            const size = Math.random() * 8 + 2 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 80 + '%';
            
            // 随机动画速度
            bubble.style.animationDuration = (Math.random() * 1 + 1) + 's';
            
            liquid.appendChild(bubble);

            // 动画结束后移除元素
            setTimeout(() => {
                bubble.remove();
            }, 2000);
        }

        function updateTemperature(tempC) {
            currentTempC = Math.max(minTempC, Math.min(maxTempC, tempC));
            
            const percent = ((currentTempC - minTempC) / (maxTempC - minTempC)) * 100;
            const visualHeight = Math.max(5, Math.min(98, percent));

            const maxHue = 220;
            const minHue = 0;
            const hue = maxHue - (percent / 100) * (maxHue - minHue);

            root.style.setProperty('--liquid-height', `${visualHeight}%`);
            root.style.setProperty('--liquid-hue', hue);
            
            updateDisplay();
        }
        
        function updateDisplay() {
            if (displayUnit === 'F') {
                const valF = Math.round((currentTempC * 9/5) + 32);
                tempValDisplay.textContent = valF;
            } else {
                tempValDisplay.textContent = Math.round(currentTempC);
            }
        }
        
        function switchUnit(unit) {
            displayUnit = unit;
            
            if (unit === 'F') {
                unitF.classList.remove('inactive');
                unitC.classList.add('inactive');
            } else {
                unitC.classList.remove('inactive');
                unitF.classList.add('inactive');
            }
            
            updateDisplay();
        }

        function handleMouseDown(e) {
            isDragging = true;
            startY = e.clientY || e.touches[0].clientY;
            startTemp = currentTempC;
            interactionArea.style.cursor = 'grabbing';
            e.preventDefault();
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            
            const clientY = e.clientY || e.touches[0].clientY;
            const deltaY = startY - clientY;
            const thermometerHeight = thermometer.offsetHeight;
            const tempRange = maxTempC - minTempC;
            const tempChange = (deltaY / thermometerHeight) * tempRange;
            
            updateTemperature(startTemp + tempChange);
            e.preventDefault();
        }

        function handleMouseUp() {
            isDragging = false;
            interactionArea.style.cursor = 'ns-resize';
        }

        function handleWheel(e) {
            e.preventDefault();
            const delta = -Math.sign(e.deltaY) * 2;
            updateTemperature(currentTempC + delta);
        }

        interactionArea.addEventListener('mousedown', handleMouseDown);
        interactionArea.addEventListener('touchstart', handleMouseDown, { passive: false });
        
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('touchmove', handleMouseMove, { passive: false });
        
        document.addEventListener('mouseup', handleMouseUp);
        document.addEventListener('touchend', handleMouseUp);
        
        thermometer.addEventListener('wheel', handleWheel, { passive: false });

        generateScale();
        updateTemperature(0);

        // 启动气泡循环
        setInterval(() => {
            // 获取当前温度百分比
            const currentHeight = parseFloat(root.style.getPropertyValue('--liquid-height'));
            // 只有当液体有一定高度时才产生气泡
            if(currentHeight > 10) {
                createBubbles();
                // 如果温度很高（高度高），额外多产生几个气泡
                if (currentHeight > 70) createBubbles();
            }
        }, 200);

    </script>
</body>
</html>
